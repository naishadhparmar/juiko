<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A27F"/>
      <stop offset="100%" stop-color="#C4826A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F5E6D8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Abstract growth / sprout motif — evokes upward movement & prosperity -->
  <!-- Central stem -->
  <path d="M100 145 L100 82" stroke="url(#accentGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Left leaf / petal -->
  <path d="M100 105 C80 95, 62 72, 68 55 C74 42, 90 48, 100 68"
        fill="#F5E6D8" opacity="0.92"/>

  <!-- Right leaf / petal -->
  <path d="M100 90 C118 78, 138 62, 140 48 C142 34, 126 32, 100 58"
        fill="#FFFFFF" opacity="0.85"/>

  <!-- Small circle — coin / seed at base -->
  <circle cx="100" cy="148" r="8" fill="#F5E6D8" opacity="0.9"/>

  <!-- Tiny sparkle dots — nod to Claude's sparkle -->
  <circle cx="145" cy="52" r="4.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="137" cy="44" r="2.5" fill="#FFFFFF" opacity="0.45"/>
</svg>
